<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Footy Brain — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: #080f1e; color: #e8edf8;
      font-family: 'Outfit', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; text-align: center; padding: 2rem;
    }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem;
         color: #00e87a; margin: .5rem 0; }
    p  { color: #6b7fa3; line-height: 1.6; }
    button {
      margin-top: 1.5rem; background: #00e87a; color: #000;
      border: none; font-family: 'Outfit', sans-serif;
      font-weight: 700; font-size: 1rem;
      padding: .85rem 2rem; border-radius: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div style="font-size:4rem;margin-bottom:.5rem;">🧠⚽</div>
    <h1>YOU'RE OFFLINE</h1>
    <p>No internet connection right now.<br>
       Your progress is safely saved on this device.<br>
       Reconnect and try again!</p>
    <button onclick="location.reload()">Try Again →</button>
  </div>
</body>
</html>
